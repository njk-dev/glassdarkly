<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nodes without edges</title>
<meta name="description" content="A generative graph of nodes that never connect. Part of glassdarkly.dev.">
<script src="/js/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e0e; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; }
</style>
</head>
<body>
<a href="/" style="position:fixed;top:16px;left:16px;z-index:10;font-family:ui-monospace,monospace;font-size:11px;letter-spacing:0.03em;color:#777;text-decoration:none;" onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#777'">&#8592; glass darkly</a>
<script>
const SEED = 40326;
let nodes = [];
let edges = [];
let failedEdges = [];
let frameCount_ = 0;

const palette = {
  bg: [14, 14, 14],
  node: [180, 175, 168],
  nodeGlow: [210, 205, 198],
  edgeAlive: [120, 118, 112, 40],
  edgeForming: [160, 155, 148, 80],
  edgeFailing: [200, 170, 140, 120],
  edgeFailed: [200, 170, 140, 0],
};

class Node {
  constructor(x, y, weight) {
    this.pos = createVector(x, y);
    this.origin = createVector(x, y);
    this.weight = weight;
    this.radius = map(weight, 0, 1, 2, 5);
    this.drift = random(TWO_PI);
    this.driftSpeed = random(0.002, 0.008);
    this.driftRadius = random(1, 4);
    this.opacity = 0;
    this.targetOpacity = map(weight, 0, 1, 80, 200);
    this.arrived = false;
    this.arrivalFrame = floor(random(30, 300));
  }

  update(frame) {
    if (frame >= this.arrivalFrame && !this.arrived) {
      this.arrived = true;
    }
    if (this.arrived) {
      this.opacity = lerp(this.opacity, this.targetOpacity, 0.02);
    }
    this.drift += this.driftSpeed;
    this.pos.x = this.origin.x + cos(this.drift) * this.driftRadius;
    this.pos.y = this.origin.y + sin(this.drift * 0.7) * this.driftRadius;
  }

  display() {
    if (this.opacity < 1) return;
    noStroke();
    fill(palette.nodeGlow[0], palette.nodeGlow[1], palette.nodeGlow[2], this.opacity * 0.15);
    ellipse(this.pos.x, this.pos.y, this.radius * 6);
    fill(palette.node[0], palette.node[1], palette.node[2], this.opacity);
    ellipse(this.pos.x, this.pos.y, this.radius * 2);
  }
}

class Edge {
  constructor(a, b, delay) {
    this.a = a;
    this.b = b;
    this.progress = 0;
    this.delay = delay;
    this.started = false;
    this.alive = true;
    this.opacity = 0;
    this.growthRate = random(0.003, 0.012);
  }

  update(frame) {
    if (frame < this.delay) return;
    if (!this.a.arrived || !this.b.arrived) return;
    this.started = true;
    if (this.alive) {
      this.progress = min(this.progress + this.growthRate, 1);
      this.opacity = lerp(this.opacity, map(this.progress, 0, 1, 10, 40), 0.03);
    }
  }

  display() {
    if (!this.started || this.opacity < 0.5) return;
    let ax = this.a.pos.x;
    let ay = this.a.pos.y;
    let bx = this.b.pos.x;
    let by = this.b.pos.y;
    let mx = lerp(ax, bx, this.progress);
    let my = lerp(ay, by, this.progress);
    stroke(palette.edgeAlive[0], palette.edgeAlive[1], palette.edgeAlive[2], this.opacity);
    strokeWeight(0.5);
    line(ax, ay, mx, my);
  }
}

class FailedEdge {
  constructor(a, b, delay) {
    this.a = a;
    this.b = b;
    this.delay = delay;
    this.started = false;
    this.progress = 0;
    this.maxProgress = random(0.3, 0.8);
    this.growthRate = random(0.01, 0.025);
    this.failing = false;
    this.failOpacity = 0;
    this.opacity = 0;
    this.dead = false;
    this.flashBrightness = 0;
  }

  update(frame) {
    if (frame < this.delay) return;
    if (!this.a.arrived || !this.b.arrived) return;
    if (this.dead) return;
    this.started = true;
    if (!this.failing) {
      this.progress += this.growthRate;
      this.opacity = lerp(this.opacity, 60, 0.05);
      if (this.progress >= this.maxProgress) {
        this.failing = true;
        this.flashBrightness = 120;
      }
    } else {
      this.flashBrightness *= 0.92;
      this.opacity *= 0.96;
      if (this.opacity < 0.3) {
        this.dead = true;
      }
    }
  }

  display() {
    if (!this.started || this.dead) return;
    let ax = this.a.pos.x;
    let ay = this.a.pos.y;
    let bx = this.b.pos.x;
    let by = this.b.pos.y;
    let mx = lerp(ax, bx, this.progress);
    let my = lerp(ay, by, this.progress);
    let r = palette.edgeFailing[0];
    let g = palette.edgeFailing[1];
    let b_ = palette.edgeFailing[2];
    if (this.flashBrightness > 1) {
      stroke(r + this.flashBrightness * 0.4, g + this.flashBrightness * 0.3, b_ + this.flashBrightness * 0.1, this.opacity + this.flashBrightness);
      strokeWeight(1.2);
    } else {
      stroke(r, g, b_, this.opacity);
      strokeWeight(0.5);
    }
    line(ax, ay, mx, my);
    if (this.failing && this.flashBrightness > 5) {
      noStroke();
      for (let i = 0; i < 3; i++) {
        let t = random(0, this.progress);
        let px = lerp(ax, bx, t) + random(-3, 3);
        let py = lerp(ay, by, t) + random(-3, 3);
        fill(r, g, b_, this.flashBrightness * 0.5);
        ellipse(px, py, random(1, 2.5));
      }
    }
  }
}

function setup() {
  let s = min(windowWidth, windowHeight);
  createCanvas(s, s);
  randomSeed(SEED);
  noiseSeed(SEED);
  generateSystem();
}

function generateSystem() {
  nodes = [];
  edges = [];
  failedEdges = [];
  frameCount_ = 0;
  let margin = width * 0.12;
  let count = floor(random(30, 50));
  for (let i = 0; i < count; i++) {
    let attempts = 0;
    let x, y, valid;
    do {
      x = random(margin, width - margin);
      y = random(margin, height - margin);
      valid = true;
      for (let n of nodes) {
        if (dist(x, y, n.pos.x, n.pos.y) < 30) {
          valid = false;
          break;
        }
      }
      attempts++;
    } while (!valid && attempts < 50);
    if (valid) {
      let weight = noise(x * 0.005, y * 0.005);
      nodes.push(new Node(x, y, weight));
    }
  }
  let possibleEdges = [];
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      let d = dist(nodes[i].pos.x, nodes[i].pos.y, nodes[j].pos.x, nodes[j].pos.y);
      if (d < width * 0.2) {
        possibleEdges.push({ i, j, d });
      }
    }
  }
  possibleEdges.sort((a, b) => a.d - b.d);
  for (let e of possibleEdges) {
    let chance = map(e.d, 0, width * 0.2, 0.6, 0.1);
    if (random() < chance) {
      let delay = floor(random(200, 1200));
      if (random() < 0.7) {
        edges.push(new Edge(nodes[e.i], nodes[e.j], delay));
      } else {
        failedEdges.push(new FailedEdge(nodes[e.i], nodes[e.j], delay));
      }
    }
  }
}

function draw() {
  background(palette.bg[0], palette.bg[1], palette.bg[2]);
  frameCount_++;
  for (let e of edges) {
    e.update(frameCount_);
    e.display();
  }
  for (let f of failedEdges) {
    f.update(frameCount_);
    f.display();
  }
  for (let n of nodes) {
    n.update(frameCount_);
    n.display();
  }
  if (frameCount_ > 600 && frameCount_ % 300 === 0 && failedEdges.filter(f => !f.dead).length < 3) {
    let a = floor(random(nodes.length));
    let b = floor(random(nodes.length));
    if (a !== b && nodes[a].arrived && nodes[b].arrived) {
      let d = dist(nodes[a].pos.x, nodes[a].pos.y, nodes[b].pos.x, nodes[b].pos.y);
      if (d < width * 0.25) {
        failedEdges.push(new FailedEdge(nodes[a], nodes[b], frameCount_ + 10));
      }
    }
  }
}

function windowResized() {
  let s = min(windowWidth, windowHeight);
  resizeCanvas(s, s);
  randomSeed(SEED);
  noiseSeed(SEED);
  generateSystem();
}
</script>
</body>
</html>

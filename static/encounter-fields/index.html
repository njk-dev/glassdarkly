<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encounter Fields</title>
    <meta name="description" content="A generative field: particles illuminate only through proximity to others. Part of glassdarkly.dev.">
    <script src="/js/p5.min.js"></script>
    <style>
        @font-face {
            font-family: 'iA Writer Quattro';
            src: url('../fonts/iAWriterQuattroS-Regular.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'iA Writer Quattro';
            src: url('../fonts/iAWriterQuattroS-Bold.woff2') format('woff2');
            font-weight: 700; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'IBM Plex Mono';
            src: url('../fonts/IBMPlexMono-Regular.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }

        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'iA Writer Quattro', Georgia, serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 13px;
            margin-bottom: 32px;
            line-height: 1.5;
            font-style: italic;
        }

        .control-section { margin-bottom: 32px; }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '\2022';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .control-group { margin-bottom: 20px; }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 50px;
            text-align: right;
        }

        .button {
            padding: 10px 16px;
            border: 1px solid var(--anthropic-light-gray);
            border-radius: 8px;
            background: white;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--anthropic-dark);
        }

        .button:hover {
            background: var(--anthropic-light);
            border-color: var(--anthropic-orange);
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.15);
        }

        #canvas-container canvas { display: block; }

        .loading {
            font-family: 'iA Writer Quattro', Georgia, serif;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
            padding: 40px;
        }

        .provenance {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--anthropic-mid-gray);
            margin-top: 32px;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <a href="/" style="display:inline-block;font-size:11px;letter-spacing:0.03em;color:#999;text-decoration:none;margin-bottom:12px;">&#8592; glass darkly</a>
            <h1>Encounter Fields</h1>
            <div class="subtitle">Particles illuminate only through proximity to others. The architecture contains everything. The expression requires encounter.</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="text" class="seed-input" id="seed-input" value="270226" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button" onclick="previousSeed()">&#8592; Prev</button>
                    <button class="button" onclick="nextSeed()">Next &#8594;</button>
                    <button class="button" onclick="randomSeedAndUpdate()">Random</button>
                    <button class="button" onclick="updateSeed()">Jump</button>
                </div>
            </div>

            <!-- Parameters -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="200" max="3000" step="100" value="1200" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">1200</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Encounter Threshold</label>
                    <div class="slider-container">
                        <input type="range" id="encounterThreshold" min="10" max="80" step="2" value="36" oninput="updateParam('encounterThreshold', this.value)">
                        <span class="value-display" id="encounterThreshold-value">36</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Flow Speed</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.015" step="0.001" value="0.005" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.005</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Luminosity Decay</label>
                    <div class="slider-container">
                        <input type="range" id="decayRate" min="0.005" max="0.06" step="0.005" value="0.02" oninput="updateParam('decayRate', this.value)">
                        <span class="value-display" id="decayRate-value">0.02</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Solitude Opacity</label>
                    <div class="slider-container">
                        <input type="range" id="baseOpacity" min="0" max="30" step="2" value="6" oninput="updateParam('baseOpacity', this.value)">
                        <span class="value-display" id="baseOpacity-value">6</span>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button" onclick="saveCanvas('encounter_fields_' + params.seed, 'png')">Download</button>
                </div>
            </div>

            <div class="provenance">seed 270226 · february 26, 2026</div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing encounter fields...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 270226,
            particleCount: 1200,
            encounterThreshold: 36,
            flowSpeed: 1.0,
            noiseScale: 0.005,
            decayRate: 0.02,
            baseOpacity: 6
        };

        let defaultParams = {...params};
        let particles = [];
        let grid = {};
        let gridSize = 40;

        function setup() {
            let dim = min(windowWidth - 400, windowHeight - 60, 900);
            dim = max(dim, 500);
            let canvas = createCanvas(dim, dim);
            canvas.parent('canvas-container');
            colorMode(HSB, 360, 100, 100, 255);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            background(18, 5, 97);
            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new Particle(
                    random(width),
                    random(height),
                    random(360)
                ));
            }
        }

        function draw() {
            // Soft fade for trail accumulation
            noStroke();
            fill(18, 5, 97, 8);
            rect(0, 0, width, height);

            // Build spatial hash grid for efficient neighbor lookup
            grid = {};
            for (let p of particles) {
                let gx = floor(p.pos.x / gridSize);
                let gy = floor(p.pos.y / gridSize);
                let key = gx + ',' + gy;
                if (!grid[key]) grid[key] = [];
                grid[key].push(p);
            }

            // Check encounters using spatial hash
            for (let p of particles) {
                let gx = floor(p.pos.x / gridSize);
                let gy = floor(p.pos.y / gridSize);

                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        let key = (gx + dx) + ',' + (gy + dy);
                        if (!grid[key]) continue;
                        for (let other of grid[key]) {
                            if (other === p) continue;
                            let d = p.pos.dist(other.pos);
                            if (d < params.encounterThreshold && d > 0) {
                                let intensity = map(d, 0, params.encounterThreshold, 1.0, 0.1);
                                p.illuminate(intensity, other.hue);
                                other.illuminate(intensity, p.hue);
                            }
                        }
                    }
                }
            }

            // Update and draw
            for (let p of particles) {
                p.update();
                p.display();
            }
        }

        class Particle {
            constructor(x, y, hue) {
                this.pos = createVector(x, y);
                this.vel = createVector(0, 0);
                this.hue = hue;
                this.displayHue = hue;
                this.luminosity = 0;
                this.prevPos = this.pos.copy();
                this.age = 0;
                this.maxAge = random(400, 1200);
            }

            illuminate(intensity, otherHue) {
                this.luminosity = min(this.luminosity + intensity * 0.3, 1.0);
                // Blend hue toward the other particle
                this.displayHue = lerpColor(
                    color(this.displayHue, 70, 85),
                    color(otherHue, 70, 85),
                    intensity * 0.15
                );
                this.displayHue = hue(this.displayHue);
            }

            update() {
                this.prevPos = this.pos.copy();

                // Flow field
                let angle = noise(
                    this.pos.x * params.noiseScale,
                    this.pos.y * params.noiseScale,
                    frameCount * 0.0008
                ) * TAU * 2.5;

                let flowForce = p5.Vector.fromAngle(angle);
                flowForce.mult(params.flowSpeed * 0.5);
                this.vel.add(flowForce);
                this.vel.limit(params.flowSpeed * 2);
                this.vel.mult(0.92);
                this.pos.add(this.vel);

                // Decay luminosity
                this.luminosity = max(0, this.luminosity - params.decayRate);

                // Age
                this.age++;

                // Wrap or rebirth
                if (this.pos.x < -10 || this.pos.x > width + 10 ||
                    this.pos.y < -10 || this.pos.y > height + 10 ||
                    this.age > this.maxAge) {
                    this.rebirth();
                }
            }

            rebirth() {
                // Born from edges
                let side = floor(random(4));
                switch(side) {
                    case 0: this.pos = createVector(random(width), -5); break;
                    case 1: this.pos = createVector(width + 5, random(height)); break;
                    case 2: this.pos = createVector(random(width), height + 5); break;
                    case 3: this.pos = createVector(-5, random(height)); break;
                }
                this.vel = createVector(0, 0);
                this.luminosity = 0;
                this.age = 0;
                this.maxAge = random(400, 1200);
                this.prevPos = this.pos.copy();
                this.hue = random(360);
                this.displayHue = this.hue;
            }

            display() {
                let alpha;
                if (this.luminosity > 0.01) {
                    alpha = map(this.luminosity, 0, 1, params.baseOpacity + 20, 220);
                    let sat = map(this.luminosity, 0, 1, 30, 80);
                    let bri = map(this.luminosity, 0, 1, 60, 100);
                    let sw = map(this.luminosity, 0, 1, 0.8, 2.5);

                    stroke(this.displayHue, sat, bri, alpha);
                    strokeWeight(sw);
                    line(this.prevPos.x, this.prevPos.y, this.pos.x, this.pos.y);
                } else {
                    // Nearly invisible in solitude
                    alpha = params.baseOpacity;
                    if (alpha > 0) {
                        stroke(this.hue, 10, 70, alpha);
                        strokeWeight(0.5);
                        point(this.pos.x, this.pos.y);
                    }
                }
            }
        }

        // UI Handlers
        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = value;

            if (paramName === 'particleCount') {
                // Adjust particle count live
                while (particles.length < numVal) {
                    particles.push(new Particle(random(width), random(height), random(360)));
                }
                while (particles.length > numVal) {
                    particles.pop();
                }
            }
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('encounterThreshold').value = params.encounterThreshold;
            document.getElementById('encounterThreshold-value').textContent = params.encounterThreshold;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('decayRate').value = params.decayRate;
            document.getElementById('decayRate-value').textContent = params.decayRate;
            document.getElementById('baseOpacity').value = params.baseOpacity;
            document.getElementById('baseOpacity-value').textContent = params.baseOpacity;
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
